<title>Train</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0A0A0A;
    --surface: #141414;
    --surface-2: #1C1C1C;
    --border: #232323;
    --border-strong: #333;
    --text: #FAFAFA;
    --text-mid: #888;
    --text-dim: #555;
    --accent: #D7FF50;
    --accent-dim: #5F7A1A;
    --warm: #FF7B47;
    --danger: #E74C3C;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    max-width: 540px;
    margin: 0 auto;
    padding: 20px 18px 100px;
    position: relative;
  }

  .mono { font-family: "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

  /* ─── HEADER ─── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-weight: 900;
    font-size: 22px;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .brand .accent { color: var(--accent); }
  .date-tag {
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ─── HOME ─── */
  .week-strip {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 28px;
  }
  .week-day {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .week-day.done {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
  .week-day.done .wd-num { color: var(--accent); }
  .week-day.today { border-color: var(--text); }
  .wd-label {
    font-size: 9px;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .wd-num {
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  .section-label {
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 18px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.05s;
    position: relative;
    overflow: hidden;
  }
  .day-card:active { transform: scale(0.99); }
  .day-card:hover { border-color: var(--border-strong); }
  .day-card.completed-today {
    border-color: var(--accent);
    background: linear-gradient(180deg, var(--surface) 0%, rgba(215, 255, 80, 0.04) 100%);
  }
  .day-card-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .day-num {
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .day-name {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .day-tag {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .day-preview {
    font-size: 12px;
    color: var(--text-mid);
    margin-top: 4px;
  }
  .day-last {
    font-size: 10px;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* ─── HISTORY LIST ─── */
  .history-list { margin-top: 24px; }
  .history-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .history-row:last-child { border-bottom: none; }
  .history-date {
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    color: var(--text-mid);
    font-size: 12px;
  }
  .history-day { font-weight: 600; }
  .history-empty {
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    padding: 24px 0;
    font-style: italic;
  }

  /* ─── DAY DETAIL ─── */
  .back-btn {
    background: none;
    border: none;
    color: var(--text-mid);
    cursor: pointer;
    font-size: 13px;
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    font-family: inherit;
  }
  .back-btn:hover { color: var(--text); }

  .day-header {
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .day-header .day-num { font-size: 11px; margin-bottom: 4px; }
  .day-header h1 {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .day-header .day-tag { font-size: 11px; }

  .exercise {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .exercise-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    gap: 10px;
  }
  .exercise-name {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .exercise-target {
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 11px;
    color: var(--text-mid);
    margin-top: 3px;
    letter-spacing: 0.03em;
  }
  .info-btn {
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    color: var(--text-mid);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: serif;
    font-style: italic;
  }
  .info-btn:hover { color: var(--accent); border-color: var(--accent); }

  .set-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .set-btn {
    flex: 1;
    min-width: 48px;
    height: 44px;
    background: transparent;
    border: 1.5px solid var(--border-strong);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.12s;
  }
  .set-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }
  .set-btn.done {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  .set-btn.done:hover { background: var(--accent); }

  /* ─── SUPERSET ─── */
  .superset-info {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 18px;
  }
  .superset-info .label {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .superset-info p {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .round-tracker {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 18px;
  }
  .round-tracker .label {
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .round-tracker .num {
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .round-tracker .num .total { color: var(--text-dim); }
  .round-dots {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    justify-content: center;
  }
  .round-dot {
    width: 32px;
    height: 6px;
    border-radius: 3px;
    background: var(--surface-2);
    border: 1px solid var(--border);
  }
  .round-dot.done { background: var(--accent); border-color: var(--accent); }

  .ss-exercise {
    display: flex;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    align-items: center;
  }
  .ss-exercise-name { font-weight: 600; font-size: 14px; }
  .ss-exercise-reps {
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
  }

  .round-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-family: inherit;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 14px;
    transition: opacity 0.15s;
  }
  .round-btn:active { opacity: 0.85; }
  .round-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── FINISH BAR ─── */
  .finish-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(0deg, var(--bg) 60%, transparent);
    padding: 16px 18px 22px;
    max-width: 540px;
    margin: 0 auto;
  }
  .finish-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-family: inherit;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .finish-btn:disabled {
    background: var(--surface-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    cursor: not-allowed;
  }
  .finish-btn.muted {
    background: transparent;
    color: var(--text-mid);
    border: 1px solid var(--border-strong);
  }
  .progress-mini {
    text-align: center;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 11px;
    color: var(--text-mid);
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }

  /* ─── MODAL ─── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    padding: 24px 22px;
    max-width: 460px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-tag {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .modal h2 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    line-height: 1.1;
  }
  .modal .target {
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    color: var(--text-mid);
    margin-bottom: 18px;
  }
  .modal-body {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
  }
  .modal-body p { margin-bottom: 12px; }
  .modal-body strong { color: var(--accent); font-weight: 600; }
  .modal-close {
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .modal-close:hover { border-color: var(--text); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: var(--bg);
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    z-index: 200;
    animation: toastIn 0.25s ease, toastOut 0.25s ease 2.5s forwards;
  }
  @keyframes toastIn { from { transform: translate(-50%, 20px); opacity: 0; } }
  @keyframes toastOut { to { transform: translate(-50%, 20px); opacity: 0; } }

  .hidden { display: none !important; }

  @media (max-width: 380px) {
    body { padding: 16px 14px 100px; }
    .day-name { font-size: 22px; }
    .day-header h1 { font-size: 32px; }
    .set-btn { min-width: 42px; }
  }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home-screen">
  <header>
    <div class="brand">TRAIN<span class="accent">.</span></div>
    <div class="date-tag mono" id="today-date">—</div>
  </header>

  <div class="section-label">
    <span>This Week</span>
    <span class="mono" id="streak-text" style="color: var(--accent);"></span>
  </div>
  <div class="week-strip" id="week-strip"></div>

  <div class="section-label"><span>Choose Your Day</span></div>
  <div id="day-cards"></div>

  <div class="history-list">
    <div class="section-label"><span>Recent Sessions</span></div>
    <div id="history-content"></div>
  </div>
</div>

<!-- DAY DETAIL SCREEN -->
<div id="day-screen" class="hidden"></div>

<!-- MODAL -->
<div id="modal-root"></div>

<script>
  // ─── DATA ──────────────────────────────────────────────────────────

  const PLAN = {
    pull: {
      number: '01',
      name: 'Pull Day',
      tag: 'Vertical & Horizontal Pull',
      preview: 'Pull-ups, chin-ups, hangs, core',
      exercises: [
        { id: 'p1', name: 'Pull-up', reps: '5 reps', sets: 4, info: `<p>Overhand grip on a bar, hands roughly shoulder-width apart, palms facing away. Hang fully extended, then pull yourself up until your <strong>chin clears the bar</strong>. Lower under control.</p><p>Targets lats, mid-back, and biceps. Keep your shoulders pulled down (no shrugging up into your ears) and avoid swinging.</p>` },
        { id: 'p2', name: 'Dead Hang', reps: '20 sec', sets: 4, info: `<p>Hang from the bar with arms fully extended, supporting your full body weight on your hands. Stay relaxed but don't completely shrug — keep your scapulae somewhat engaged.</p><p>Builds <strong>grip endurance</strong>, decompresses the spine, and conditions your hands for heavier pull work.</p>` },
        { id: 'p3', name: 'Chin-up', reps: '5 reps', sets: 4, info: `<p>Underhand grip, palms facing you, hands shoulder-width or slightly narrower. Pull until your chin clears the bar.</p><p>Same general motion as a pull-up, but with <strong>stronger biceps involvement</strong>. Lower under control.</p>` },
        { id: 'p4', name: 'Australian Pull-up', reps: '12 reps', sets: 4, info: `<p>Also called the inverted row. Set a bar at hip height (or use rings). Lie underneath with your body straight, heels on the ground, arms straight.</p><p>Pull your chest to the bar, lower under control. Hits <strong>horizontal pulling</strong> — a critical complement to your vertical pull-up work.</p>` },
        { id: 'p5', name: 'Scapular Pull-up Hold', reps: '15 sec', sets: 4, info: `<p>Hang from the bar with straight arms. Without bending your elbows, <strong>pull your shoulder blades down and together</strong> so your body rises slightly. Hold that retracted position.</p><p>Trains scapular control, which is essential for safe, strong pull-up work. If you skip this, full pull-ups stay capped.</p>` },
        { id: 'p6', name: 'Hollow Body Hold', reps: '30 sec', sets: 5, info: `<p>Lie on your back. Press your lower back firmly into the floor. Lift your arms overhead and your legs off the ground at the same time, forming a shallow banana shape.</p><p>Keep your <strong>lower back glued to the floor</strong> the entire time. Too hard? Keep arms at sides or bend knees.</p>` }
      ]
    },
    push: {
      number: '02',
      name: 'Push Day',
      tag: 'Chest, Shoulders, Triceps',
      preview: 'Dips, push-up variations, core',
      exercises: [
        { id: 'pu1', name: 'Dips', reps: '8 reps', sets: 3, info: `<p>On parallel bars or a sturdy edge, support yourself with arms locked out. Lower until your shoulders are at about elbow height (or just below). Push back to lockout.</p><p>Targets <strong>chest, triceps, and front delts</strong>. Lean forward slightly to bias the chest, stay upright to bias the triceps.</p>` },
        { id: 'pu2', name: 'Push-up', reps: '12 reps', sets: 3, info: `<p>Standard plank, hands shoulder-width. Keep your body in a <strong>straight line</strong> — no sagging hips, no piked butt. Lower your chest toward the floor until your elbows hit about 90°. Push back to start.</p>` },
        { id: 'pu3', name: 'Shoulder Taps', reps: '10 reps', sets: 3, info: `<p>In a push-up plank, tap your left shoulder with your right hand, replace, then opposite. Each tap = one rep, so 10 reps means 5 per side.</p><p><strong>Keep your hips stable</strong> — don't let them rock side to side. This is anti-rotation core work as much as it is shoulder.</p>` },
        { id: 'pu4', name: 'Wide Push-up', reps: '12 reps', sets: 3, info: `<p>Standard push-up but with hands wider than shoulders. Shifts emphasis to the <strong>chest</strong>. Elbows flare more but keep the movement controlled.</p>` },
        { id: 'pu5', name: 'Scapular Push-up', reps: '20 reps', sets: 3, info: `<p>Hold a high plank with straight arms. Without bending your elbows, let your chest sink between your shoulders (scapular retraction), then push the floor away to round your upper back (protraction).</p><p>Small, controlled movement. Trains <strong>serratus anterior</strong> — the muscle that lets your scapulae glide.</p>` },
        { id: 'pu6', name: 'Pinch Dips', reps: '8 reps', sets: 3, info: `<p>Close-grip dips. Bring your hands closer together and keep your <strong>elbows tucked toward your body</strong> as you lower. Shifts emphasis to the triceps.</p>` },
        { id: 'pu7', name: 'Plank Hold', reps: '30 sec', sets: 3, info: `<p>Forearm plank: elbows under shoulders, body in a straight line from heels to head. Don't let hips sag or pike up.</p><p><strong>Brace your core hard</strong> — like someone's about to punch you in the gut.</p>` }
      ]
    },
    legs: {
      number: '03',
      name: 'Leg + Core',
      tag: 'Lower Body & Midline',
      preview: 'Squats, lunges, raises, holds',
      exercises: [
        { id: 'l1', name: 'Lunges', reps: '12 reps', sets: 3, info: `<p>Step forward with one leg. Lower until both knees hit roughly <strong>90°</strong> (front shin vertical, back knee just off the floor). Push back to standing through your front heel.</p><p>12 reps typically means 12 per leg unless your coach specifies otherwise.</p>` },
        { id: 'l2', name: 'Squat', reps: '15 reps', sets: 3, info: `<p>Feet shoulder-width, toes slightly out. <strong>Sit back</strong> as if into a chair, keeping your chest up and knees tracking over your toes. Go to at least parallel (hips at knee level), then drive up.</p>` },
        { id: 'l3', name: 'Wide Squat', reps: '10 reps', sets: 3, info: `<p>Feet wider than shoulders, toes pointed out more (about 30°). Sit straight down, knees track over toes.</p><p>Hits the <strong>inner thighs and glutes</strong> harder than a standard squat.</p>` },
        { id: 'l4', name: 'Crunches', reps: '15 reps', sets: 3, info: `<p>Lie on your back, knees bent, feet flat. <strong>Curl your shoulder blades off the floor</strong> by contracting your abs — don't yank your neck or use momentum. Small range, controlled.</p>` },
        { id: 'l5', name: 'Knee Bar Raises', reps: '15 reps', sets: 3, info: `<p>Hang from a pull-up bar. Bring your knees up toward your chest, then control them back down without swinging. <strong>Don't use momentum</strong> — if you start kipping, slow down.</p>` },
        { id: 'l6', name: 'Leg Raises', reps: '12 reps', sets: 3, info: `<p>Either hanging (raise straight legs to horizontal) or lying on your back (lower straight legs from vertical to just above the floor without your lower back arching).</p><p>Pick the harder version you can do with <strong>full control</strong>.</p>` },
        { id: 'l7', name: 'Hollow Body Hold', reps: '25 sec', sets: 3, info: `<p>Same as Pull Day, slightly shorter hold. Lower back pressed into floor, arms overhead, legs lifted, banana shape.</p>` },
        { id: 'l8', name: 'Plank', reps: '45 sec', sets: 3, info: `<p>Forearm plank, longer hold. Body in a straight line from heels to head. Brace hard. <strong>Quality over duration</strong> — if your hips drop, the time stops counting in your head.</p>` }
      ]
    },
    superset: {
      number: '04',
      name: 'Superset',
      tag: 'Circuit · No Rest Between Exercises',
      preview: '5 exercises × 6 rounds, no rest within rounds',
      isSuperset: true,
      rounds: 6,
      exercises: [
        { id: 's1', name: 'Pull-up', reps: '5 reps' },
        { id: 's2', name: 'Dips', reps: '5 reps' },
        { id: 's3', name: 'Push-up', reps: '10 reps' },
        { id: 's4', name: 'Squat', reps: '15 reps' },
        { id: 's5', name: 'Crunches', reps: '20 reps' }
      ],
      info: `<p><strong>No rest between exercises within a round.</strong> Move straight from pull-up to dips to push-up to squat to crunches — that's one round.</p><p>Complete <strong>6 full rounds</strong>. Rest between rounds is up to you, but keep it short.</p>`
    }
  };

  const DAY_KEYS = ['pull', 'push', 'legs', 'superset'];

  // ─── STATE & STORAGE ───────────────────────────────────────────────

  let state = {
    sessions: {},        // { pull: { date, sets: {p1: 2, ...} }, ... }
    superset: { date: null, round: 0 },
    history: []          // [{ date, day, sets, total }]
  };

  let currentDayKey = null;

  async function loadState() {
    try {
      const stored = localStorage.getItem('training_state');
      if (stored) {
        state = JSON.parse(stored);
      }
    } catch (e) { /* no prior state */ }
  }

  async function saveState() {
    try {
      localStorage.setItem('training_state', JSON.stringify(state));
    } catch (e) {
      console.error('Save failed:', e);
    }
  }

  // ─── HELPERS ───────────────────────────────────────────────────────

  function todayISO() {
    const d = new Date();
    return d.toISOString().split('T')[0];
  }

  function formatDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
  }

  function getCurrentSession(dayKey) {
    const day = PLAN[dayKey];
    if (day.isSuperset) {
      if (state.superset.date !== todayISO()) {
        state.superset = { date: todayISO(), round: 0 };
      }
      return state.superset;
    }
    if (!state.sessions[dayKey] || state.sessions[dayKey].date !== todayISO()) {
      state.sessions[dayKey] = { date: todayISO(), sets: {} };
    }
    return state.sessions[dayKey];
  }

  function totalSetsForDay(dayKey) {
    const day = PLAN[dayKey];
    if (day.isSuperset) return day.rounds;
    return day.exercises.reduce((sum, ex) => sum + ex.sets, 0);
  }

  function completedSetsForDay(dayKey) {
    const day = PLAN[dayKey];
    if (day.isSuperset) {
      const s = getCurrentSession(dayKey);
      return s.round;
    }
    const s = state.sessions[dayKey];
    if (!s || s.date !== todayISO()) return 0;
    return day.exercises.reduce((sum, ex) => sum + (s.sets[ex.id] || 0), 0);
  }

  function isCompletedToday(dayKey) {
    return state.history.some(h => h.date === todayISO() && h.day === dayKey);
  }

  // ─── RENDER: HOME ──────────────────────────────────────────────────

  function renderHome() {
    document.getElementById('home-screen').classList.remove('hidden');
    document.getElementById('day-screen').classList.add('hidden');

    document.getElementById('today-date').textContent = formatDate(todayISO());

    renderWeekStrip();
    renderDayCards();
    renderHistory();
    updateStreak();
  }

  function renderWeekStrip() {
    const today = new Date();
    const todayDay = today.getDay(); // 0=Sun
    const monday = new Date(today);
    monday.setDate(today.getDate() - ((todayDay + 6) % 7));

    const labels = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];
    const strip = document.getElementById('week-strip');
    strip.innerHTML = '';

    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const iso = d.toISOString().split('T')[0];
      const isToday = iso === todayISO();
      const isDone = state.history.some(h => h.date === iso);

      const el = document.createElement('div');
      el.className = 'week-day' + (isDone ? ' done' : '') + (isToday ? ' today' : '');
      el.innerHTML = `<div class="wd-label">${labels[i]}</div><div class="wd-num">${d.getDate()}</div>`;
      strip.appendChild(el);
    }
  }

  function updateStreak() {
    let streak = 0;
    const today = new Date();
    for (let i = 0; i < 60; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const iso = d.toISOString().split('T')[0];
      if (state.history.some(h => h.date === iso)) {
        streak++;
      } else if (i > 0) {
        break;
      }
    }
    const el = document.getElementById('streak-text');
    el.textContent = streak > 0 ? `${streak}-DAY STREAK` : '';
  }

  function renderDayCards() {
    const container = document.getElementById('day-cards');
    container.innerHTML = '';

    DAY_KEYS.forEach(key => {
      const day = PLAN[key];
      const completedToday = isCompletedToday(key);
      const lastDone = state.history.filter(h => h.day === key).sort((a, b) => b.date.localeCompare(a.date))[0];

      const card = document.createElement('div');
      card.className = 'day-card' + (completedToday ? ' completed-today' : '');
      card.innerHTML = `
        <div class="day-card-head">
          <span class="day-num mono">DAY ${day.number}</span>
          ${completedToday ? '<span class="day-tag">✓ Done Today</span>' : `<span class="day-tag">${day.tag}</span>`}
        </div>
        <div class="day-name">${day.name}</div>
        <div class="day-preview">${day.preview}</div>
        ${lastDone ? `<div class="day-last">Last: ${formatDate(lastDone.date)}</div>` : ''}
      `;
      card.onclick = () => openDay(key);
      container.appendChild(card);
    });
  }

  function renderHistory() {
    const container = document.getElementById('history-content');
    const recent = state.history.slice().sort((a, b) => b.date.localeCompare(a.date)).slice(0, 8);

    if (recent.length === 0) {
      container.innerHTML = '<div class="history-empty">No sessions yet. Pick a day above to start.</div>';
      return;
    }

    container.innerHTML = recent.map(h => `
      <div class="history-row">
        <div>
          <div class="history-day">${PLAN[h.day].name}</div>
          <div class="history-date">${formatDate(h.date)}</div>
        </div>
        <div class="mono" style="color: var(--accent); font-weight: 700;">${h.sets}/${h.total}</div>
      </div>
    `).join('');
  }

  // ─── RENDER: DAY ───────────────────────────────────────────────────

  function openDay(key) {
    currentDayKey = key;
    document.getElementById('home-screen').classList.add('hidden');
    const screen = document.getElementById('day-screen');
    screen.classList.remove('hidden');

    const day = PLAN[key];
    if (day.isSuperset) {
      renderSuperset(screen, day);
    } else {
      renderDayDetail(screen, day, key);
    }
    window.scrollTo(0, 0);
  }

  function renderDayDetail(screen, day, key) {
    const session = getCurrentSession(key);

    screen.innerHTML = `
      <button class="back-btn" onclick="goHome()">← Back</button>
      <div class="day-header">
        <div class="day-num mono">DAY ${day.number}</div>
        <h1>${day.name}</h1>
        <div class="day-tag">${day.tag}</div>
      </div>
      <div id="exercise-list"></div>
      <div class="finish-bar">
        <div class="progress-mini" id="progress-mini"></div>
        <button class="finish-btn" id="finish-btn" onclick="finishWorkout()">Finish Workout</button>
      </div>
    `;

    const list = document.getElementById('exercise-list');
    day.exercises.forEach(ex => {
      const done = session.sets[ex.id] || 0;
      const exEl = document.createElement('div');
      exEl.className = 'exercise';
      exEl.innerHTML = `
        <div class="exercise-head">
          <div>
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-target">${ex.reps} · ${ex.sets} SETS</div>
          </div>
          <button class="info-btn" onclick="showInfo('${ex.id}', '${key}')">i</button>
        </div>
        <div class="set-row" data-exercise="${ex.id}">
          ${Array.from({length: ex.sets}, (_, i) => `
            <button class="set-btn ${i < done ? 'done' : ''}" onclick="toggleSet('${ex.id}', ${i})">${i + 1}</button>
          `).join('')}
        </div>
      `;
      list.appendChild(exEl);
    });

    updateProgress();
  }

  function renderSuperset(screen, day) {
    const session = getCurrentSession('superset');

    screen.innerHTML = `
      <button class="back-btn" onclick="goHome()">← Back</button>
      <div class="day-header">
        <div class="day-num mono">DAY ${day.number}</div>
        <h1>${day.name}</h1>
        <div class="day-tag">${day.tag}</div>
      </div>

      <div class="superset-info">
        <div class="label">How it works</div>
        ${day.info}
      </div>

      <div class="round-tracker">
        <div>
          <div class="label">Current Round</div>
          <div class="num"><span id="round-num">${session.round}</span><span class="total">/${day.rounds}</span></div>
        </div>
        <button class="info-btn" onclick="showSupersetInfo()">i</button>
      </div>

      <div class="round-dots" id="round-dots">
        ${Array.from({length: day.rounds}, (_, i) => `
          <div class="round-dot ${i < session.round ? 'done' : ''}"></div>
        `).join('')}
      </div>

      <div id="ss-exercises">
        ${day.exercises.map(ex => `
          <div class="ss-exercise">
            <div class="ss-exercise-name">${ex.name}</div>
            <div class="ss-exercise-reps">${ex.reps}</div>
          </div>
        `).join('')}
      </div>

      <button class="round-btn" id="round-btn" onclick="completeRound()" ${session.round >= day.rounds ? 'disabled' : ''}>
        ${session.round >= day.rounds ? 'All Rounds Complete' : 'Round Complete →'}
      </button>

      <div class="finish-bar">
        <button class="finish-btn ${session.round < day.rounds ? 'muted' : ''}" onclick="finishWorkout()" ${session.round === 0 ? 'disabled' : ''}>
          ${session.round >= day.rounds ? 'Finish Workout' : 'Save & Exit'}
        </button>
      </div>
    `;
  }

  // ─── ACTIONS ───────────────────────────────────────────────────────

  function goHome() {
    currentDayKey = null;
    renderHome();
  }

  async function toggleSet(exerciseId, setIndex) {
    const session = getCurrentSession(currentDayKey);
    const current = session.sets[exerciseId] || 0;

    // If clicking the next set in sequence, increment
    // If clicking a completed set at the end, decrement
    if (setIndex + 1 > current) {
      session.sets[exerciseId] = setIndex + 1;
    } else if (setIndex + 1 === current) {
      session.sets[exerciseId] = current - 1;
    } else {
      session.sets[exerciseId] = setIndex + 1;
    }

    await saveState();
    refreshSetButtons(exerciseId);
    updateProgress();
  }

  function refreshSetButtons(exerciseId) {
    const session = getCurrentSession(currentDayKey);
    const done = session.sets[exerciseId] || 0;
    const row = document.querySelector(`[data-exercise="${exerciseId}"]`);
    if (!row) return;
    row.querySelectorAll('.set-btn').forEach((btn, i) => {
      btn.classList.toggle('done', i < done);
    });
  }

  function updateProgress() {
    const done = completedSetsForDay(currentDayKey);
    const total = totalSetsForDay(currentDayKey);
    const el = document.getElementById('progress-mini');
    const btn = document.getElementById('finish-btn');
    if (!el || !btn) return;
    el.textContent = `${done} / ${total} sets completed`;
    btn.disabled = done === 0;
    if (done >= total) {
      btn.textContent = 'Complete Workout ✓';
    } else {
      btn.textContent = 'Finish Workout';
    }
  }

  async function completeRound() {
    const session = getCurrentSession('superset');
    if (session.round < PLAN.superset.rounds) {
      session.round++;
      await saveState();
      renderSuperset(document.getElementById('day-screen'), PLAN.superset);
    }
  }

  async function finishWorkout() {
    const done = completedSetsForDay(currentDayKey);
    const total = totalSetsForDay(currentDayKey);
    if (done === 0) return;

    // Remove any prior entry for today + this day
    state.history = state.history.filter(h => !(h.date === todayISO() && h.day === currentDayKey));

    state.history.push({
      date: todayISO(),
      day: currentDayKey,
      sets: done,
      total: total
    });

    // Reset today's session
    if (PLAN[currentDayKey].isSuperset) {
      state.superset = { date: null, round: 0 };
    } else {
      delete state.sessions[currentDayKey];
    }

    await saveState();
    showToast(done >= total ? 'WORKOUT LOGGED ✓' : 'PROGRESS SAVED');
    setTimeout(() => goHome(), 800);
  }

  // ─── MODAL ─────────────────────────────────────────────────────────

  function showInfo(exerciseId, dayKey) {
    const ex = PLAN[dayKey].exercises.find(e => e.id === exerciseId);
    if (!ex) return;
    renderModal(ex.name, `${ex.reps} · ${ex.sets} SETS`, ex.info);
  }

  function showSupersetInfo() {
    renderModal('Superset Circuit', '5 EXERCISES · 6 ROUNDS', PLAN.superset.info);
  }

  function renderModal(title, target, body) {
    const root = document.getElementById('modal-root');
    root.innerHTML = `
      <div class="modal-backdrop" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-tag">Form Notes</div>
          <h2>${title}</h2>
          <div class="target mono">${target}</div>
          <div class="modal-body">${body}</div>
          <button class="modal-close" onclick="closeModal(event)">Close</button>
        </div>
      </div>
    `;
  }

  function closeModal(e) {
    if (e && e.target.closest('.modal') && !e.target.classList.contains('modal-close')) return;
    document.getElementById('modal-root').innerHTML = '';
  }

  // ─── TOAST ─────────────────────────────────────────────────────────

  function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ─── INIT ──────────────────────────────────────────────────────────

  (async function init() {
    await loadState();
    renderHome();
  })();
</script>
